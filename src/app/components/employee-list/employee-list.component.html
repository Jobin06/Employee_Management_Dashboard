<div class="header-actions">
    <h2>Employee Directory</h2>
    <div class="filters">
        <mat-form-field appearance="outline" class="filter-field">
            <mat-label>Filter Directory</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Alice" #input>
            <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline" class="filter-field">
            <mat-label>Department</mat-label>
            <mat-select [value]="selectedDepartment" (selectionChange)="onDepartmentChange($event.value)">
                <mat-option *ngFor="let dept of departments" [value]="dept">{{dept}}</mat-option>
            </mat-select>
        </mat-form-field>
    </div>
</div>

<div class="table-container mat-elevation-z4">
    <div class="loading-shade" *ngIf="isLoading">
        <mat-spinner diameter="40"></mat-spinner>
    </div>

    <table mat-table [dataSource]="dataSource" matSort>

        <!-- Name Column -->
        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
            <td mat-cell *matCellDef="let employee">
                <strong>{{employee.name}}</strong>
            </td>
        </ng-container>

        <!-- Role Column -->
        <ng-container matColumnDef="role">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Role </th>
            <td mat-cell *matCellDef="let employee"> {{employee.role}} </td>
        </ng-container>

        <!-- Department Column -->
        <ng-container matColumnDef="department">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Department </th>
            <td mat-cell *matCellDef="let employee">
                <span class="dept-badge">{{employee.department}}</span>
            </td>
        </ng-container>

        <!-- Salary Column -->
        <ng-container matColumnDef="salary">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Salary </th>
            <td mat-cell *matCellDef="let employee" [appHighlightSalary]="employee.salary">
                {{employee.salary | currency:'USD':'symbol':'1.0-0'}}
            </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="actions-header"> Actions </th>
            <td mat-cell *matCellDef="let employee" class="actions-cell">
                <button mat-icon-button color="primary" [routerLink]="['/employee', employee.id]" title="View Details">
                    <mat-icon>visibility</mat-icon>
                </button>
                <button mat-icon-button color="accent" [routerLink]="['/edit-employee', employee.id]" title="Edit">
                    <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button color="warn" (click)="deleteEmployee(employee.id, $event)" title="Delete">
                    <mat-icon>delete</mat-icon>
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="employee-row"
            [routerLink]="['/employee', row.id]"></tr>

        <!-- Row shown when there is no matching data. -->
        <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell empty-cell" colspan="5" *ngIf="!isLoading">
                No employees found matching the current filters.
            </td>
        </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of employees"></mat-paginator>
</div>
